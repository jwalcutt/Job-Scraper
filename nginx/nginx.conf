# Nginx reverse proxy — routes everything through a single domain.
#
#  /        → Next.js frontend  (internal: frontend:3000)
#  /api/    → FastAPI backend   (internal: api:8000, prefix stripped)
#  /docs    → FastAPI Swagger   (forwarded as-is for internal debugging)
#
# TLS is terminated here; both HTTP and HTTPS are handled.

upstream api_backend {
    server api:8000;
}

upstream frontend_backend {
    server frontend:3000;
}

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # Certbot will manage these paths (docker volume: /etc/letsencrypt)
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # ── API: strip /api prefix before forwarding ──────────────────────────────
    location /api/ {
        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Disable body buffering for streaming responses
        proxy_buffering    off;
    }

    # ── Certbot ACME challenge ────────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Next.js frontend (everything else) ────────────────────────────────────
    location / {
        proxy_pass         http://frontend_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
