# Production compose — builds from images, no volume-mounted source code.
#
# Usage:
#   DOMAIN=app.example.com docker compose -f docker-compose.prod.yml up -d
#
# Before first run:
#   1. Copy .env.example → .env and fill in real values (APP_ENV=production, etc.)
#   2. Run Certbot once to obtain TLS cert:
#      docker compose -f docker-compose.prod.yml run --rm certbot certonly \
#        --webroot --webroot-path /var/www/certbot -d $DOMAIN
#   3. docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobscraper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-jobscraper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobscraper}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobscraper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jobscraper}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/scripts/start.sh"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobscraper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jobscraper}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.worker", "worker", "--loglevel=info", "--concurrency=4"]

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobscraper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jobscraper}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
    depends_on:
      - redis
    command: ["celery", "-A", "app.tasks.worker", "beat", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    restart: always
    environment:
      NODE_ENV: production
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run manually to issue/renew: docker compose run --rm certbot renew
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:
